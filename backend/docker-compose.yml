# Gebzem backend altyapisi — Hetzner sunucuda ve yerel gelistirmede ayni dosya
# Sunucuda: bu klasorde `JWT_SECRET=...` iceren bir .env dosyasi olmali (git'e girmez)
services:
  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://gebzem:gebzem@postgres:5432/gebzem?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      DEV_MODE: "true"   # prototip: OTP SMS yerine API yanitinda doner
      PORT: "8080"
      FCM_SA_PATH: /secrets/fcm-sa.json
      # iOS kilit ekrani aramasi (VoIP push) — FCM VoIP GONDEREMEZ, dogrudan APNs
      APNS_KEY_PATH: /secrets/apns.p8
      APNS_KEY_ID: ${APNS_KEY_ID}
      APNS_TEAM_ID: ${APNS_TEAM_ID}
      APNS_BUNDLE_ID: app.gebzem
      SENTRY_DSN: ${SENTRY_DSN}
      # Arama (LiveKit)
      # FAZ-3C HIZ: dogrudan sinyal (CF'siz). GERI ALMA: wss://rtc.gebzem.app + api restart
      # (fallback'li build sahada — rtcd kurulamazsa istemci kendisi rtc'ye duser).
      LIVEKIT_URL: wss://rtcd.gebzem.app:7443
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # Admin uclari anahtari (dogrulama bulgusu: repo PUBLIC — kod icindeki varsayilan
      # anahtar kullanilamaz; sunucu .env'inde GUCLU deger ZORUNLU)
      ADMIN_KEY: ${ADMIN_KEY:-}
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASS: ${ADMIN_PASS:-}
    volumes:
      - ./fcm-sa.json:/secrets/fcm-sa.json:ro
      - ./apns.p8:/secrets/apns.p8:ro
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gebzem
      POSTGRES_PASSWORD: gebzem
      POSTGRES_DB: gebzem
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
