# Gebzem backend altyapisi — Hetzner sunucuda ve yerel gelistirmede ayni dosya
# Sunucuda: bu klasorde `JWT_SECRET=...` iceren bir .env dosyasi olmali (git'e girmez)
services:
  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://gebzem:gebzem@postgres:5432/gebzem?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      DEV_MODE: "true"   # prototip: OTP SMS yerine API yanitinda doner
      PORT: "8080"
      FCM_SA_PATH: /secrets/fcm-sa.json
      SENTRY_DSN: ${SENTRY_DSN}
      # Arama (LiveKit)
      LIVEKIT_URL: wss://rtc.gebzem.app
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    volumes:
      - ./fcm-sa.json:/secrets/fcm-sa.json:ro
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gebzem
      POSTGRES_PASSWORD: gebzem
      POSTGRES_DB: gebzem
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
