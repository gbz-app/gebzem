# LiveKit sunucu ayarlari — sesli/goruntulu arama, sesli oda, canli yayin
port: 7880

rtc:
  # Medya portlari
  tcp_port: 7881 # UDP engelliyse yedek yol
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: true
  # FAZ-2 HIZ: ICE-Lite — sunucu tarafi aday toplama/kontrol basitlesir, baglanti kurulumunda
  # ~50-150ms kazanc. Geri alma: bu satiri sil + livekit force-recreate.
  use_ice_lite: true
  # Docker ic aglarini ICE adayi olarak yayinlama (aksi halde istemci bosuna dener)
  interfaces:
    excludes:
      - docker0
      - br-*
      - veth*

# TURN: kati NAT/mobil operator arkasindaki cihazlar icin ZORUNLU (Turk operatorleri)
# TLS 443'te calisir — kisitli aglarda HTTPS gibi gorunur, engellenmez
turn:
  enabled: true
  domain: turn.gebzem.app
  tls_port: 443
  udp_port: 3478
  external_tls: false
  cert_file: /etc/letsencrypt/live/turn.gebzem.app/fullchain.pem
  key_file: /etc/letsencrypt/live/turn.gebzem.app/privkey.pem

keys:
  # docker-compose'dan env ile gelir (LIVEKIT_KEYS)

logging:
  level: info

# Odalar bos kalinca otomatik kapansin (kaynak israfini onler)
room:
  empty_timeout: 60
  departure_timeout: 20
  max_participants: 32 # WhatsApp grup arama siniriyla ayni
