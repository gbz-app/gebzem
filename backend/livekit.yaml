# LiveKit sunucu ayarlari — sesli/goruntulu arama, sesli oda, canli yayin
port: 7880

rtc:
  # Medya portlari (UDP) — mobil sebekelerde en saglam yol
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: true

# TURN: kati NAT/mobil operator arkasindaki cihazlar icin (Turk operatorlerinde sart)
turn:
  enabled: true
  domain: turn.gebzem.app
  tls_port: 5349
  udp_port: 3478
  external_tls: true

keys:
  # docker-compose'dan env ile gelir (LIVEKIT_KEYS)

logging:
  level: info

# Odalar bos kalinca otomatik kapansin (kaynak israfini onler)
room:
  empty_timeout: 60
  departure_timeout: 20
  max_participants: 32 # WhatsApp grup arama siniriyla ayni
