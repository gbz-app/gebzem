name: Android APK

on:
  workflow_dispatch: # elle tetiklenir (API'den de)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Imzalama anahtari
        working-directory: mobile/android
        env:
          KEYSTORE_B64: ${{ secrets.GEBZEM_KEYSTORE_B64 }}
          KEYSTORE_PASS: ${{ secrets.GEBZEM_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.GEBZEM_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > gebzem-release.jks
          ls -l gebzem-release.jks
          # dogrula: keystore gecerli mi
          keytool -list -keystore gebzem-release.jks -storepass "$KEYSTORE_PASS" | head -3
          cat > key.properties <<EOF
          storeFile=gebzem-release.jks
          storePassword=$KEYSTORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEYSTORE_PASS
          EOF

      - name: Bagimliliklar
        working-directory: mobile
        run: flutter pub get

      - name: APK derle
        working-directory: mobile
        run: flutter build apk --release --dart-define=API_URL=https://api.gebzem.app

      - uses: actions/upload-artifact@v4
        with:
          name: gebzem-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
