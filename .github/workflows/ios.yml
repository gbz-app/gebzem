name: iOS IPA (ad hoc)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Imzalama araclari
        run: pip3 install codemagic-cli-tools

      - name: Sertifika + profil (otomatik olusur)
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
        run: |
          keychain initialize
          app-store-connect fetch-signing-files app.gebzem --type IOS_APP_ADHOC --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Bagimliliklar
        working-directory: mobile
        run: flutter pub get

      - name: IPA derle
        working-directory: mobile
        run: |
          flutter build ipa --release \
            --dart-define=API_URL=https://api.gebzem.app \
            --export-options-plist=$HOME/export_options.plist
          ls -la build/ios/ipa/

      - uses: actions/upload-artifact@v4
        with:
          name: gebzem-ipa
          path: mobile/build/ios/ipa/*.ipa
          retention-days: 7
