name: iOS IPA (ad hoc)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Imzalama araclari
        # PEP 668: macOS runner'da sistem python korumali -> sanal ortam kullan
        run: |
          python3 -m venv $HOME/venv
          $HOME/venv/bin/pip install --quiet codemagic-cli-tools
          echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Sertifika + profil (otomatik olusur)
        env:
          ASC_P8_B64: ${{ secrets.ASC_P8_B64 }}
          CERT_KEY_B64: ${{ secrets.CERT_KEY_B64 }}
        run: |
          # Anahtarlar base64 olarak saklanir (cok satirli degerler bozulmasin diye)
          echo "$ASC_P8_B64" | base64 -d > /tmp/asc.p8
          echo "$CERT_KEY_B64" | base64 -d > /tmp/cert_key.pem
          export APP_STORE_CONNECT_ISSUER_ID="${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/asc.p8)"
          export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/cert_key.pem)"
          keychain initialize
          app-store-connect fetch-signing-files app.gebzem --type IOS_APP_ADHOC --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Bagimliliklar
        working-directory: mobile
        run: flutter pub get

      - name: IPA derle
        working-directory: mobile
        run: |
          flutter build ipa --release \
            --build-number=${GITHUB_RUN_NUMBER} \
            --build-name=1.0.${GITHUB_RUN_NUMBER} \
            --dart-define=API_URL=https://api.gebzem.app \
            --export-options-plist=$HOME/export_options.plist
          ls -la build/ios/ipa/

      - uses: actions/upload-artifact@v4
        with:
          name: gebzem-ipa
          path: mobile/build/ios/ipa/*.ipa
          retention-days: 7
