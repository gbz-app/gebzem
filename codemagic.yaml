# Gebzem CI/CD — Codemagic bulut derlemeleri
# android-build: test APK'si uretir (canli sunucuya bagli)
# ios-build: Apple .p8 anahtari eklenince aktiflesecek (TestFlight)

workflows:
  android-build:
    name: Android APK (test)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Bagimliliklar
        script: cd mobile && flutter pub get
      - name: APK derle (canli sunucu adresiyle)
        script: |
          cd mobile
          flutter build apk --release --dart-define=API_URL=https://api.gebzem.app
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk

  ios-adhoc:
    name: iOS Ad Hoc (telefona kurulum linki)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      flutter: stable
      groups:
        - appstore_credentials # Apple imzalama anahtarlari (Codemagic'te guvenli saklanir)
    scripts:
      - name: Imzalama dosyalari (sertifika+profil otomatik olusur)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files app.gebzem --type IOS_APP_ADHOC --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Bagimliliklar
        script: cd mobile && flutter pub get
      - name: IPA derle (canli sunucu adresiyle)
        script: |
          cd mobile
          flutter build ipa --release \
            --dart-define=API_URL=https://api.gebzem.app \
            --export-options-plist=/Users/builder/export_options.plist
          echo "--- IPA konumu ---"
          ls -la build/ios/ipa/ && test -n "$(ls build/ios/ipa/*.ipa 2>/dev/null)"
          # ipa uretilmediyse adim FAIL olsun (flutter sessiz gecebiliyor)
    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - mobile/build/**/*.ipa
      - flutter_build/**/*.ipa
